name: Deploy NewsHub to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Inject API keys + build timestamp
        env:
          CURRENTS_API_KEY: ${{ secrets.CURRENTS_API_KEY }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
        run: |
          BUILD_TIME=$(date -u '+%d %b %Y, %H:%M UTC')
          sed -i \
            -e "s|__CURRENTS_API_KEY__|${CURRENTS_API_KEY}|g" \
            -e "s|__GROQ_API_KEY__|${GROQ_API_KEY}|g" \
            -e "s|__BUILD_TIME__|${BUILD_TIME}|g" \
            index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
