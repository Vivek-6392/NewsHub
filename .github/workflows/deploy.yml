name: Deploy NewsHub to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:name: Deploy NewsHub to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Debug secrets (you can remove later)
      - name: Debug secrets
        run: |
          echo "Currents length: ${#CURRENTS_API_KEY}"
          echo "Groq length: ${#GROQ_API_KEY}"
        env:
          CURRENTS_API_KEY: ${{ secrets.CURRENTS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # ✅ Inject API keys using Node (robust)
      - name: Inject API keys + timestamp
        env:
          CURRENTS_API_KEY: ${{ secrets.CURRENTS_API_KEY }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
        run: |
          BUILD_TIME=$(date -u '+%d %b %Y, %H:%M UTC')

          node <<EOF
          const fs = require('fs');

          let html = fs.readFileSync('index.html', 'utf8');

          html = html.replace(/__CURRENTS_API_KEY__/g, process.env.CURRENTS_API_KEY);
          html = html.replace(/__GROQ_API_KEY__/g, process.env.GROQ_API_KEY);
          html = html.replace(/__BUILD_TIME__/g, "${BUILD_TIME}");

          fs.writeFileSync('index.html', html);
          console.log("✅ Keys injected successfully");
          EOF

      # ✅ Verify replacement
      - name: Verify injection
        run: |
          if grep -q '__CURRENTS_API_KEY__\|__GROQ_API_KEY__' index.html; then
            echo "❌ ERROR: Keys not injected"
            exit 1
          else
            echo "✅ Keys replaced successfully"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
